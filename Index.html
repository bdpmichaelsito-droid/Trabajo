<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRANSNUPERSA S.A. - Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; }
        .hidden { display: none !important; }
        .card { transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>
<div id="app" class="min-h-screen flex flex-col">
    <!-- NAVBAR -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center flex-wrap">
            <h1 class="text-2xl font-bold text-blue-700">🚛 TRANSNUPERSA S.A.</h1>
            <div id="authButtons" class="flex gap-2">
                <button onclick="showLogin()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Iniciar Sesión</button>
                <button onclick="showRegister()" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Registrarse</button>
            </div>
            <div id="userInfo" class="hidden flex items-center gap-4">
                <span id="userName" class="font-medium"></span>
                <span id="userRole" class="badge bg-gray-200 text-gray-800"></span>
                <button onclick="logout()" class="text-red-600 hover:text-red-800 text-sm">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <main class="container mx-auto p-4 flex-grow">
        <!-- LOGIN -->
        <div id="loginScreen" class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-10">
            <h2 class="text-2xl font-bold mb-6">Iniciar Sesión</h2>
            <form onsubmit="login(event)">
                <div class="mb-4"><label class="block text-gray-700">Email</label><input type="email" id="loginEmail" required class="w-full border p-2 rounded"></div>
                <div class="mb-4"><label class="block text-gray-700">Contraseña</label><input type="password" id="loginPassword" required class="w-full border p-2 rounded"></div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Ingresar</button>
            </form>
            <p class="mt-4 text-center text-sm text-gray-600">¿No tienes cuenta? <a href="#" onclick="showRegister()" class="text-blue-600">Regístrate</a></p>
        </div>

        <!-- REGISTRO -->
        <div id="registerScreen" class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-10 hidden">
            <h2 class="text-2xl font-bold mb-6">Registrarse</h2>
            <form onsubmit="register(event)">
                <div class="mb-4"><label class="block text-gray-700">Nombre</label><input type="text" id="regName" required class="w-full border p-2 rounded"></div>
                <div class="mb-4"><label class="block text-gray-700">Email</label><input type="email" id="regEmail" required class="w-full border p-2 rounded"></div>
                <div class="mb-4"><label class="block text-gray-700">Contraseña</label><input type="password" id="regPassword" required class="w-full border p-2 rounded"></div>
                <div class="mb-4"><label class="block text-gray-700">Rol</label>
                    <select id="regRol" class="w-full border p-2 rounded">
                        <option value="tecnico">Técnico</option>
                        <option value="jefe">Jefe de Mantenimiento</option>
                        <option value="supervisor">Supervisor</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Registrarse</button>
            </form>
            <p class="mt-4 text-center text-sm text-gray-600">¿Ya tienes cuenta? <a href="#" onclick="showLogin()" class="text-blue-600">Inicia Sesión</a></p>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="hidden">
            <div class="flex flex-wrap gap-2 mb-6 bg-white p-4 rounded-lg shadow">
                <button onclick="showSection('vehiculos')" class="px-4 py-2 bg-blue-100 hover:bg-blue-200 rounded">🚛 Vehículos</button>
                <button onclick="showSection('preventivos')" class="px-4 py-2 bg-green-100 hover:bg-green-200 rounded">🛠️ Preventivos</button>
                <button onclick="showSection('correctivos')" class="px-4 py-2 bg-yellow-100 hover:bg-yellow-200 rounded">🔧 Correctivos</button>
                <button onclick="showSection('ordenes')" class="px-4 py-2 bg-purple-100 hover:bg-purple-200 rounded">📋 Órdenes</button>
                <button onclick="showSection('historial')" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded">📜 Historial</button>
                <button onclick="showSection('reportes')" class="px-4 py-2 bg-red-100 hover:bg-red-200 rounded">📊 Reportes</button>
                <button onclick="showSection('alertas')" class="px-4 py-2 bg-orange-100 hover:bg-orange-200 rounded">🔔 Alertas</button>
                <button id="adminUsersBtn" onclick="showSection('usuarios')" class="px-4 py-2 bg-indigo-100 hover:bg-indigo-200 rounded hidden">👥 Usuarios</button>
            </div>

            <!-- SECCIONES (contenido dinámico) -->
            <div id="sectionVehiculos" class="section-content bg-white p-6 rounded-lg shadow">
                <h2 class="text-2xl font-bold mb-4">Gestión de Vehículos</h2>
                <button onclick="mostrarFormulario('vehiculo')" class="bg-blue-600 text-white px-4 py-2 rounded mb-4">+ Agregar Vehículo</button>
                <div id="vehiculosList"></div>
                <div id="vehiculoForm" class="hidden mt-4 p-4 border rounded bg-gray-50">
                    <form onsubmit="guardarVehiculo(event)">
                        <input type="hidden" id="vehiculoId">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="vPlaca" placeholder="Placa" required class="border p-2 rounded">
                            <input type="text" id="vMarca" placeholder="Marca" required class="border p-2 rounded">
                            <input type="text" id="vModelo" placeholder="Modelo" required class="border p-2 rounded">
                            <input type="number" id="vAnio" placeholder="Año" class="border p-2 rounded">
                            <input type="text" id="vChasis" placeholder="Chasis" class="border p-2 rounded">
                            <input type="text" id="vMotor" placeholder="Motor" class="border p-2 rounded">
                            <input type="text" id="vTipo" placeholder="Tipo" class="border p-2 rounded">
                            <input type="number" id="vCapacidad" placeholder="Capacidad (ton)" class="border p-2 rounded">
                            <input type="text" id="vCombustible" placeholder="Combustible" class="border p-2 rounded">
                            <input type="number" id="vKilometraje" placeholder="Kilometraje" class="border p-2 rounded">
                            <input type="date" id="vFechaAdq" class="border p-2 rounded">
                            <select id="vEstado" class="border p-2 rounded">
                                <option value="activo">Activo</option>
                                <option value="mantenimiento">En Mantenimiento</option>
                                <option value="fuera_servicio">Fuera de Servicio</option>
                            </select>
                            <input type="text" id="vConductor" placeholder="Conductor" class="border p-2 rounded">
                            <textarea id="vObservaciones" placeholder="Observaciones" class="border p-2 rounded col-span-2"></textarea>
                        </div>
                        <button type="submit" class="mt-2 bg-green-600 text-white px-4 py-2 rounded">Guardar</button>
                        <button type="button" onclick="ocultarFormulario('vehiculo')" class="mt-2 bg-gray-400 text-white px-4 py-2 rounded">Cancelar</button>
                    </form>
                </div>
            </div>

            <!-- Las demás secciones (Preventivos, Correctivos, Órdenes, Historial, Reportes, Alertas, Usuarios) se cargan dinámicamente -->
            <div id="sectionPreventivos" class="section-content bg-white p-6 rounded-lg shadow hidden"><h2 class="text-2xl font-bold mb-4">Preventivos</h2><div id="preventivosList"></div></div>
            <div id="sectionCorrectivos" class="section-content bg-white p-6 rounded-lg shadow hidden"><h2 class="text-2xl font-bold mb-4">Correctivos</h2><div id="correctivosList"></div></div>
            <div id="sectionOrdenes" class="section-content bg-white p-6 rounded-lg shadow hidden"><h2 class="text-2xl font-bold mb-4">Órdenes</h2><div id="ordenesList"></div></div>
            <div id="sectionHistorial" class="section-content bg-white p-6 rounded-lg shadow hidden"><h2 class="text-2xl font-bold mb-4">Historial</h2><div id="historialContent"></div></div>
            <div id="sectionReportes" class="section-content bg-white p-6 rounded-lg shadow hidden"><h2 class="text-2xl font-bold mb-4">Reportes</h2><div id="reportesContent"></div></div>
            <div id="sectionAlertas" class="section-content bg-white p-6 rounded-lg shadow hidden"><h2 class="text-2xl font-bold mb-4">Alertas</h2><div id="alertasList"></div></div>
            <div id="sectionUsuarios" class="section-content bg-white p-6 rounded-lg shadow hidden"><h2 class="text-2xl font-bold mb-4">Usuarios</h2><div id="usuariosList"></div></div>
        </div>
    </main>
    <footer class="bg-white shadow-inner p-4 text-center text-gray-500 text-sm">TRANSNUPERSA S.A. - Gestión de Mantenimiento</footer>
</div>

<script>
// ============================================================
// 1. INICIALIZACIÓN DE DATOS EN LOCALSTORAGE
// ============================================================
function initLocalStorage() {
    if (!localStorage.getItem('usuarios')) {
        const usuarios = [
            { id: 1, email: 'admin@transnupersa.com', nombre: 'Administrador', rol: 'admin', password: 'admin123' },
            { id: 2, email: 'jefe@transnupersa.com', nombre: 'Jefe', rol: 'jefe', password: 'jefe123' }
        ];
        localStorage.setItem('usuarios', JSON.stringify(usuarios));
    }
    if (!localStorage.getItem('vehiculos')) {
        localStorage.setItem('vehiculos', JSON.stringify([]));
    }
    if (!localStorage.getItem('preventivos')) {
        localStorage.setItem('preventivos', JSON.stringify([]));
    }
    if (!localStorage.getItem('correctivos')) {
        localStorage.setItem('correctivos', JSON.stringify([]));
    }
    if (!localStorage.getItem('ordenes')) {
        localStorage.setItem('ordenes', JSON.stringify([]));
    }
    if (!localStorage.getItem('tipos_mantenimiento')) {
        const tipos = [
            { id: 1, codigo: 'MT001', nombre: 'Cambio de aceite', periodicidad_km: 15000, periodicidad_dias: 180 },
            { id: 2, codigo: 'MT002', nombre: 'Cambio de filtros', periodicidad_km: 20000, periodicidad_dias: 180 },
            { id: 3, codigo: 'MT003', nombre: 'Revisión de frenos', periodicidad_km: 10000, periodicidad_dias: 90 },
            { id: 4, codigo: 'MT004', nombre: 'Revisión de neumáticos', periodicidad_km: 5000, periodicidad_dias: 30 }
        ];
        localStorage.setItem('tipos_mantenimiento', JSON.stringify(tipos));
    }
    if (!localStorage.getItem('tipos_averia')) {
        const averias = [
            { id: 1, codigo: 'AV001', nombre: 'Motor' },
            { id: 2, codigo: 'AV002', nombre: 'Sistema de frenos' },
            { id: 3, codigo: 'AV003', nombre: 'Transmisión' },
            { id: 4, codigo: 'AV004', nombre: 'Sistema eléctrico' },
            { id: 5, codigo: 'AV005', nombre: 'Suspensión' }
        ];
        localStorage.setItem('tipos_averia', JSON.stringify(averias));
    }
    if (!localStorage.getItem('nextIds')) {
        localStorage.setItem('nextIds', JSON.stringify({ vehiculo: 1, preventivo: 1, correctivo: 1, orden: 1 }));
    }
}
initLocalStorage();

// ============================================================
// 2. FUNCIONES AUXILIARES PARA LOCALSTORAGE
// ============================================================
function getData(key) { return JSON.parse(localStorage.getItem(key)) || []; }
function setData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function getNextId(tipo) {
    const ids = JSON.parse(localStorage.getItem('nextIds'));
    const id = ids[tipo] || 1;
    ids[tipo] = id + 1;
    localStorage.setItem('nextIds', JSON.stringify(ids));
    return id;
}

// ============================================================
// 3. AUTENTICACIÓN
// ============================================================
let currentUser = null;

function login(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const usuarios = getData('usuarios');
    const user = usuarios.find(u => u.email === email && u.password === password);
    if (!user) {
        alert('Email o contraseña incorrectos');
        return;
    }
    currentUser = user;
    document.getElementById('authButtons').classList.add('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('userName').textContent = user.nombre;
    document.getElementById('userRole').textContent = user.rol.toUpperCase();
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('registerScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    if (user.rol === 'admin') document.getElementById('adminUsersBtn').classList.remove('hidden');
    cargarTodosLosDatos();
    showSection('vehiculos');
}

function register(e) {
    e.preventDefault();
    const nombre = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const rol = document.getElementById('regRol').value;
    const usuarios = getData('usuarios');
    if (usuarios.find(u => u.email === email)) {
        alert('Este email ya está registrado');
        return;
    }
    const newUser = { id: usuarios.length + 1, email, nombre, rol, password };
    usuarios.push(newUser);
    setData('usuarios', usuarios);
    alert('Registro exitoso. Ahora inicia sesión.');
    showLogin();
}

function logout() {
    currentUser = null;
    document.getElementById('authButtons').classList.remove('hidden');
    document.getElementById('userInfo').classList.add('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('registerScreen').classList.add('hidden');
}

function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('registerScreen').classList.add('hidden');
}
function showRegister() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('registerScreen').classList.remove('hidden');
}

// ============================================================
// 4. NAVEGACIÓN
// ============================================================
function showSection(section) {
    document.querySelectorAll('.section-content').forEach(el => el.classList.add('hidden'));
    const map = {
        vehiculos: 'sectionVehiculos',
        preventivos: 'sectionPreventivos',
        correctivos: 'sectionCorrectivos',
        ordenes: 'sectionOrdenes',
        historial: 'sectionHistorial',
        reportes: 'sectionReportes',
        alertas: 'sectionAlertas',
        usuarios: 'sectionUsuarios'
    };
    document.getElementById(map[section]).classList.remove('hidden');
    if (section === 'vehiculos') cargarVehiculos();
    if (section === 'preventivos') cargarPreventivos();
    if (section === 'correctivos') cargarCorrectivos();
    if (section === 'ordenes') cargarOrdenes();
    if (section === 'historial') cargarHistorial();
    if (section === 'reportes') cargarReportes();
    if (section === 'alertas') cargarAlertas();
    if (section === 'usuarios') cargarUsuarios();
}

// ============================================================
// 5. CRUD VEHÍCULOS
// ============================================================
function cargarVehiculos() {
    const data = getData('vehiculos');
    const container = document.getElementById('vehiculosList');
    if (data.length === 0) {
        container.innerHTML = '<p class="text-gray-500">No hay vehículos registrados.</p>';
        return;
    }
    let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
    data.forEach(v => {
        html += `<div class="card bg-gray-50 p-4 rounded-lg border">
            <h3 class="font-bold">${v.placa} - ${v.marca} ${v.modelo}</h3>
            <p class="text-sm">Kilometraje: ${v.kilometraje || 0} km | Estado: <span class="badge bg-blue-100">${v.estado || 'activo'}</span></p>
            <div class="mt-2 flex gap-2">
                <button onclick="editarVehiculo(${v.id})" class="text-blue-600 hover:underline">Editar</button>
                <button onclick="eliminarVehiculo(${v.id})" class="text-red-600 hover:underline">Eliminar</button>
            </div>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function guardarVehiculo(e) {
    e.preventDefault();
    const id = document.getElementById('vehiculoId').value;
    const data = {
        placa: document.getElementById('vPlaca').value,
        marca: document.getElementById('vMarca').value,
        modelo: document.getElementById('vModelo').value,
        año: document.getElementById('vAnio').value || null,
        chasis: document.getElementById('vChasis').value || '',
        motor: document.getElementById('vMotor').value || '',
        tipo: document.getElementById('vTipo').value || '',
        capacidad: document.getElementById('vCapacidad').value || null,
        combustible: document.getElementById('vCombustible').value || '',
        kilometraje: document.getElementById('vKilometraje').value || 0,
        fecha_adquisicion: document.getElementById('vFechaAdq').value || '',
        estado: document.getElementById('vEstado').value,
        conductor: document.getElementById('vConductor').value || '',
        observaciones: document.getElementById('vObservaciones').value || ''
    };
    let vehiculos = getData('vehiculos');
    if (id) {
        const index = vehiculos.findIndex(v => v.id == id);
        if (index !== -1) vehiculos[index] = { ...vehiculos[index], ...data };
    } else {
        data.id = getNextId('vehiculo');
        vehiculos.push(data);
    }
    setData('vehiculos', vehiculos);
    ocultarFormulario('vehiculo');
    cargarVehiculos();
}

function editarVehiculo(id) {
    const vehiculos = getData('vehiculos');
    const v = vehiculos.find(v => v.id === id);
    if (!v) return;
    document.getElementById('vehiculoId').value = v.id;
    document.getElementById('vPlaca').value = v.placa;
    document.getElementById('vMarca').value = v.marca;
    document.getElementById('vModelo').value = v.modelo;
    document.getElementById('vAnio').value = v.año || '';
    document.getElementById('vChasis').value = v.chasis || '';
    document.getElementById('vMotor').value = v.motor || '';
    document.getElementById('vTipo').value = v.tipo || '';
    document.getElementById('vCapacidad').value = v.capacidad || '';
    document.getElementById('vCombustible').value = v.combustible || '';
    document.getElementById('vKilometraje').value = v.kilometraje || '';
    document.getElementById('vFechaAdq').value = v.fecha_adquisicion || '';
    document.getElementById('vEstado').value = v.estado || 'activo';
    document.getElementById('vConductor').value = v.conductor || '';
    document.getElementById('vObservaciones').value = v.observaciones || '';
    document.getElementById('vehiculoForm').classList.remove('hidden');
}

function eliminarVehiculo(id) {
    if (!confirm('¿Eliminar este vehículo?')) return;
    let vehiculos = getData('vehiculos');
    vehiculos = vehiculos.filter(v => v.id !== id);
    setData('vehiculos', vehiculos);
    cargarVehiculos();
}

// ============================================================
// 6. FUNCIONES PARA FORMULARIOS
// ============================================================
function mostrarFormulario(tipo) {
    const map = { vehiculo: 'vehiculoForm' };
    document.getElementById(map[tipo]).classList.remove('hidden');
    if (tipo === 'vehiculo') document.getElementById('vehiculoId').value = '';
}
function ocultarFormulario(tipo) {
    const map = { vehiculo: 'vehiculoForm' };
    document.getElementById(map[tipo]).classList.add('hidden');
}

// ============================================================
// 7. CARGAR TODOS LOS DATOS (INICIAL)
// ============================================================
function cargarTodosLosDatos() {
    cargarVehiculos();
    cargarPreventivos();
    cargarCorrectivos();
    cargarOrdenes();
    cargarHistorial();
    cargarReportes();
    cargarAlertas();
    cargarUsuarios();
}

// ============================================================
// 8. SECCIONES RESTANTES (PREVENTIVOS, CORRECTIVOS, ÓRDENES, ETC.)
// ============================================================
// ... (implementa las funciones faltantes siguiendo el mismo patrón: obtener datos de localStorage, renderizar, guardar, editar, eliminar)

// ============================================================
// 9. INICIO AUTOMÁTICO
// ============================================================
// Si hay una sesión activa, mostramos el dashboard
// (para simplificar, siempre mostramos login)
</script>
</body>
</html>
